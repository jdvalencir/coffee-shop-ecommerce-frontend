name: Deploy Frontend To S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_PAYMENT_TOKENIZATION_URL: ${{ vars.VITE_PAYMENT_TOKENIZATION_URL }}
      VITE_PAYMENT_PUBLIC_KEY: ${{ vars.VITE_PAYMENT_PUBLIC_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm exec jest --runInBand

      - name: Build app
        run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync static files to S3
        run: aws s3 sync dist/ "s3://${S3_BUCKET}" --delete

      - name: Re-upload index.html without cache
        run: >
          aws s3 cp dist/index.html "s3://${S3_BUCKET}/index.html"
          --cache-control "no-cache, no-store, must-revalidate"
          --content-type "text/html"

      - name: Invalidate CloudFront cache
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: >
          aws cloudfront create-invalidation
          --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
          --paths "/*"
